worker_processes 4;

events {
  worker_connections 1024;
}

http {
  include mime.types;

  default_type  application/octet-stream;

  set_real_ip_from        0.0.0.0/0;
  real_ip_recursive       on;
  real_ip_header          X-Forward-For;
  limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

  # DNS Resolver for upstream domain resolution
  resolver 8.8.8.8 1.1.1.1 valid=300s;
  resolver_timeout 5s;

  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
    listen 3000;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass https://gess-workos-api-production.up.railway.app/api/;
      proxy_set_header Host gess-workos-api-production.up.railway.app;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cookie_domain gess-workos-api-production.up.railway.app gess-workos-frontend-production.up.railway.app;

      # Enable TLS SNI for Railway Edge routing
      proxy_ssl_server_name on;
      proxy_ssl_name gess-workos-api-production.up.railway.app;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    location /auth/ {
      proxy_pass https://gess-workos-api-production.up.railway.app/auth/;
      proxy_set_header Host gess-workos-api-production.up.railway.app;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cookie_domain gess-workos-api-production.up.railway.app gess-workos-frontend-production.up.railway.app;

      # Enable TLS SNI for Railway Edge routing
      proxy_ssl_server_name on;
      proxy_ssl_name gess-workos-api-production.up.railway.app;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }
  }
}

